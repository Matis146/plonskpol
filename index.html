function clone(g){
  const ng = JSON.parse(JSON.stringify({
    ...g,
    players: g.players.map(p=>({...p, owns:[...p.owns], mortgaged:[...p.mortgaged]}))
  }));
  ng.players.forEach(p=>{ p.owns = new Set(p.owns); p.mortgaged = new Set(p.mortgaged); });
  return ng;
}

function movePlayer(g, p, steps){
  const prev = p.pos;
  p.pos = (p.pos + steps) % 40;
  if(p.pos < prev && steps>0){
    let bonus = g.opts.passGo;
    if(g.activeEvent?.effect.type==='go_bonus') bonus += g.activeEvent.effect.val;
    p.money += bonus;
    g.log.unshift({text:`${p.token} ${p.name} mija RYNEK (+${bonus} zł)`, kind:'good', t:Date.now()});
  }
  resolveTile(g, p, steps);
}
window.movePlayer = movePlayer;

function sendToJail(g, p){
  p.pos = 10; p.jail = true; p.jailTurns = 0; g.doublesCount = 0;
  g.log.unshift({text:`${p.token} ${p.name}: prosto do ARESZTU!`, kind:'warn', t:Date.now()});
}
window.sendToJail = sendToJail;

function pay(g, p, amount){
  p.money -= amount;
  if(p.money<0){
    g.log.unshift({text:`⚠️ ${p.name} ma ${p.money} zł — sprzedaj domki lub zastaw nieruchomości!`, kind:'warn', t:Date.now()});
  }
}

function canRaiseFunds(g, p){
  if(Object.values(p.houses).some(h=>h>0)) return true;
  return [...p.owns].some(i=>!p.mortgaged.has(i));
}

function declareBankrupt(g, p){
  p.bankrupt = true;
  p.owns.forEach(i=>{ delete g.owners[i]; delete p.houses[i]; });
  p.owns = new Set(); p.mortgaged = new Set(); p.money = 0;
  if(p.loan){ g.log.unshift({text:`🏦 Bank odpisuje kredyt ${p.loan.owed} zł — ${p.name} zbankrutował`, kind:'warn', t:Date.now()}); p.loan=null; }
  g.log.unshift({text:`💀 ${p.token} ${p.name} zbankrutował i odpada z gry!`, kind:'warn', t:Date.now()});
}

// Buduje mapę kolor→tile oraz listę rail id (wywołuj raz)
const _GROUP_TILES = {};
const _RAIL_IDS = [];
(function(){
  BOARD.forEach(t=>{
    if(t.type==='street'){ if(!_GROUP_TILES[t.group]) _GROUP_TILES[t.group]=[]; _GROUP_TILES[t.group].push(t.i); }
    else if(t.type==='rail') _RAIL_IDS.push(t.i);
  });
})();

function checkMonopolyWin(g){
  if(g.phase==='gameover') return null;
  for(const p of g.players){
    if(p.bankrupt) continue;
    const complete = Object.values(_GROUP_TILES).filter(tiles=>tiles.every(i=>p.owns.has(i))).length;
    const rails    = _RAIL_IDS.filter(i=>p.owns.has(i)).length;
    if(complete>=3 && rails===4) return p;
  }
  return null;
}

function doApplyCard(g, card){
  const p = g.players[g.cur];
  g.log.unshift({text:`🎴 ${card.text}`, kind:'info', t:Date.now()});
  const a = card.act;
  if(a.type==='money'){ p.money += a.n; }
  else if(a.type==='jail'){ sendToJail(g, p); g.phase='end'; delete g.pendingCard; return; }
  else if(a.type==='get_out_jail'){ p.getOutCards++; }
  else if(a.type==='move'){
    p.pos = (p.pos + a.n + 40) % 40;
    delete g.pendingCard; resolveTile(g, p, Math.abs(a.n)); return;
  }
  else if(a.type==='move_to'){
    const prev = p.pos; p.pos = a.i;
    if(p.pos < prev) p.money += g.opts.passGo;
    delete g.pendingCard; resolveTile(g, p, 0); return;
  }
  else if(a.type==='nearest_rail'){
    const rails=[5,15,25,35]; const prev=p.pos;
    const next = rails.find(r=>r>p.pos) || rails[0];
    p.pos = next;
    if(p.pos<prev) p.money += g.opts.passGo;
    delete g.pendingCard; resolveTile(g, p, 0); return;
  }
  else if(a.type==='birthday'){
    g.players.forEach(op=>{ if(op.id!==p.id && !op.bankrupt){ op.money-=a.n; p.money+=a.n; } });
  }
  else if(a.type==='repairs'){
    let houses=0, hotels=0;
    p.owns.forEach(i=>{ const h = p.houses[i]||0; if(h===5) hotels++; else houses+=h; });
    p.money -= houses*a.house + hotels*a.hotel;
  }
  delete g.pendingCard; g.phase='end';
}

function resolveTile(g, p, roll){
  const t = BOARD[p.pos];
  if(t.type==='street' || t.type==='rail' || t.type==='utility'){
    const owner = g.owners[t.i];
    if(owner==null){ g.pendingBuy = t.i; g.phase = 'buy'; }
    else if(owner!==p.id){
      const ownerP = g.players[owner];
      if(ownerP.mortgaged.has(t.i)){
        g.log.unshift({text:`${t.name} jest w zastawie — czynszu brak`,kind:'info',t:Date.now()});
        g.phase='end'; return;
      }
      const rent = rentFor(g, t, roll);
      p.money -= rent; ownerP.money += rent;
      g.log.unshift({text:`${p.name} płaci ${ownerP.name} ${rent} zł za ${t.name}`, kind:'warn', t:Date.now()});
      if(p.money < 0 && !canRaiseFunds(g, p)) declareBankrupt(g, p);
      g.phase='end';
    } else { g.phase='end'; }
  } else if(t.type==='tax'){
    let amount = t.amount;
    if(g.activeEvent?.effect.type==='tax_mult') amount = Math.round(amount * g.activeEvent.effect.val);
    p.money -= amount;
    g.log.unshift({text:`${p.name}: ${t.name} -${amount} zł`, kind:'warn', t:Date.now()});
    g.phase='end';
  } else if(t.type==='jail'){
    sendToJail(g, p); g.phase='end';
  } else if(t.type==='gotojail'){
    sendToJail(g, p); g.phase='end';
  } else if(t.type==='chance'){
    const card = CHANCE[g.chanceIdx % CHANCE.length]; g.chanceIdx++;
    g.pendingCard = {deck:'chance', card}; g.phase = 'card';
  } else if(t.type==='chest'){
    const card = CHEST[g.chestIdx % CHEST.length]; g.chestIdx++;
    g.pendingCard = {deck:'chest', card}; g.phase = 'card';
  } else if(t.type==='slot'){
    g.phase='slot';
  } else if(t.type==='stadium'){
    g.phase='stadium';
  } else if(t.type==='zabka'){
    g.phase='zabka';
  } else if(t.type==='jarmark'){
    g.phase='jarmark';
  } else if(t.type==='casino'){
    g.phase='casino';
  } else { g.phase='end'; }
}

function EventPopup({ text, hiding }) {
  if(!text) return null;
  const clean = text.replace('📰 WIADOMOŚCI: ','');
  return (
    <div className="event-popup-overlay">
      <div className={`event-popup${hiding?' hiding':''}`}>
        <div className="epop-label">📰 Wiadomości z Płońska</div>
        <div className="epop-icon">🗞️</div>
        <div className="epop-text">{clean}</div>
      </div>
    </div>
  );
}

function applyImmediateEvent(g, ev){
  const alive = g.players.filter(p=>!p.bankrupt);
  const {type, val} = ev.effect;
  if(type==='all_pay'){
    alive.forEach(p=>{ p.money -= val; });
  } else if(type==='all_gain'){
    alive.forEach(p=>{ p.money += val; });
  } else if(type==='hotel_bonus'){
    alive.forEach(p=>{
      const hasHotel = Object.values(p.houses).some(h=>h===5);
      if(hasHotel){ p.money += val; }
    });
  } else if(type==='richest_pay'){
    const richest = alive.reduce((a,b)=>netWorth(g,a.id)>netWorth(g,b.id)?a:b);
    richest.money -= val;
    g.log.unshift({text:`💸 ${richest.name} płaci podatek od bogactwa -${val} zł`, kind:'warn', t:Date.now()});
  }
}

function drawEvent(g){
  const events = window.CITY_EVENTS;
  const ev = events[Math.random()*events.length|0];
  g.log.unshift({text:`📰 WIADOMOŚCI: ${ev.text}${ev.turns>0?' ('+ev.turns+' rundy)':''}`, kind:'event', t:Date.now()});
  if(ev.turns===0){
    if(ev.effect.type!=='none') applyImmediateEvent(g, ev);
    g.activeEvent = null;
  } else {
    g.activeEvent = { ...ev, turnsLeft: ev.turns };
  }
}

function Lobby({ onCreateGame, onJoinGame }) {
  const [code, setCode] = useState('');
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState('');

  async function handleJoin(){
    if(code.length < 6) return;
    setBusy(true); setErr('');
    const result = await onJoinGame(code.toUpperCase());
    if(result && result.error) setErr(result.error);
    setBusy(false);
  }

  return (
    <div className="lobby">
      <div className="lobby-hero">
        <div className="lobby-title">PŁOŃSKPOL</div>
        <div className="lobby-sub">gra o Mieście Młodości Chopina</div>
      </div>
      <div className="lobby-cards">
        <div className="lobby-card">
          <span className="lobby-card-icon">🏠</span>
          <div className="lobby-card-title">Stwórz grę</div>
          <div className="lobby-card-desc">Skonfiguruj grę i zaproś znajomych kodem pokoju</div>
          <button className="lobby-btn lobby-btn-primary" style={{marginTop:8}} onClick={onCreateGame}>
            Stwórz grę
          </button>
        </div>
        <div className="lobby-card">
          <span className="lobby-card-icon">🔗</span>
          <div className="lobby-card-title">Dołącz do gry</div>
          <div className="lobby-card-desc">Wpisz kod od znajomego który stworzył pokój</div>
          <input className="lobby-code-input" value={code}
            onChange={e=>{ setCode(e.target.value.toUpperCase()); setErr(''); }}
            onKeyDown={e=>e.key==='Enter'&&handleJoin()}
            placeholder="ABC123" maxLength={6}/>
          <div className="lobby-error">{err}</div>
          <button className="lobby-btn lobby-btn-secondary" onClick={handleJoin}
            disabled={busy || code.length < 6}>
            {busy ? 'Łączenie…' : 'Dołącz →'}
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [mpMode, setMpMode]       = useState('lobby');   // lobby | setup | game
  const [roomCode, setRoomCode]   = useState(null);
  const [myIdx, setMyIdx]         = useState(null);      // which player am I (0-based)
  const roomRef  = useRef(null);
  const myIdxRef = useRef(null);
  const [game, setGame] = useState(null);
  const [selectedTile, setSelectedTile] = useState(null);
  const [modal, setModal] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [animState, setAnimState] = useState(null);
  const prevPosRef = useRef(null);
  const [popupText, setPopupText] = useState(null);
  const [popupHiding, setPopupHiding] = useState(false);
  const lastEventTRef = useRef(0);
  const [timeLeft, setTimeLeft] = useState(null);

  // Keep refs in sync so useMemo callbacks can read latest values
  useEffect(()=>{ roomRef.current = roomCode; }, [roomCode]);
  useEffect(()=>{ myIdxRef.current = myIdx; }, [myIdx]);

  // Firebase listener — sync remote state locally (without writing back)
  useEffect(()=>{
    if(!roomCode) return;
    window.FB.listenState(roomCode, remoteGame => setGame(remoteGame));
    return () => window.FB.unlistenState(roomCode);
  }, [roomCode]);

  // Wykryj nowe zdarzenie i pokaż popup
  useEffect(()=>{
    if(!game) return;
    const latest = game.log.find(e => e.kind==='event');
    if(latest && latest.t > lastEventTRef.current){
      lastEventTRef.current = latest.t;
      setPopupText(latest.text);
      setPopupHiding(false);
      setTimeout(()=>setPopupHiding(true), 2500);
      setTimeout(()=>setPopupText(null), 3100);
    }
  }, [game]);

  // Wykrywaj zmianę pozycji gracza i startuj animację
  useEffect(()=>{
    if(!game){ prevPosRef.current = null; return; }
    const curPos = game.players.map(p => p.pos);
    if(prevPosRef.current){
      game.players.forEach((p, idx)=>{
        if(!p.bankrupt && p.pos !== prevPosRef.current[idx]){
          const from = prevPosRef.current[idx];
          const to = p.pos;
          // Buduj kroki do przodu po planszy
          const steps = [];
          let cur = from;
          let count = 0;
          while(cur !== to && count < 40){ cur = (cur+1)%40; steps.push(cur); count++; }
          // Animuj tylko normalne rzuty (max 12 pól), resztę teleportuj
          if(steps.length > 0 && steps.length <= 12){
            setAnimState({ playerId: idx, displayPos: from, steps, stepIdx: 0 });
          }
        }
      });
    }
    prevPosRef.current = curPos;
  }, [game]);

  // Przesuwaj pionek krok po kroku co 180ms
  useEffect(()=>{
    if(!animState) return;
    if(animState.stepIdx >= animState.steps.length){ setAnimState(null); return; }
    const timer = setTimeout(()=>{
      setAnimState(prev => prev ? ({
        ...prev,
        displayPos: prev.steps[prev.stepIdx],
        stepIdx: prev.stepIdx + 1,
      }) : null);
    }, 180);
    return ()=>clearTimeout(timer);
  }, [animState]);

  const isAnimating = animState !== null;

  useEffect(()=>{
    const onMsg = (e) => {
      if(e.data?.type==='__activate_edit_mode') setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    return ()=>window.removeEventListener('message', onMsg);
  },[]);

  const api = useMemo(() => {
    const mutate = (fn) => setGame(g => {
      const ng = clone(g); fn(ng);
      if(roomRef.current) window.FB.writeState(roomRef.current, ng).catch(()=>{});
      return ng;
    });
    const addLog = (g, text, kind) => g.log.unshift({ text, kind: kind||'info', t: Date.now() });

    return {
      rollDice(){
        mutate(g => {
          const p = g.players[g.cur];
          const d1 = 1+Math.random()*6|0, d2 = 1+Math.random()*6|0;
          g.dice = [d1,d2]; g.lastRoll = d1+d2;
          const isDouble = d1===d2;
          if(p.jail){
            if(isDouble){
              addLog(g, `${p.token} ${p.name}: dublet ${d1}-${d2} — wychodzi z aresztu!`, 'good');
              p.jail = false; p.jailTurns = 0; movePlayer(g, p, d1+d2);
            } else {
              p.jailTurns++;
              addLog(g, `${p.token} ${p.name}: ${d1}-${d2}, siedzi dalej (tura ${p.jailTurns}/3)`);
              if(p.jailTurns>=3){
                addLog(g, `${p.name} musi zapłacić 50 zł kaucji`, 'warn');
                pay(g, p, 50); p.jail=false; p.jailTurns=0; movePlayer(g, p, d1+d2);
              } else { g.phase = 'end'; }
            }
            return;
          }
          if(isDouble) g.doublesCount++; else g.doublesCount = 0;
          if(g.doublesCount>=3){
            addLog(g, `${p.name}: trzeci dublet — idziesz do aresztu!`, 'warn');
            sendToJail(g, p); g.phase='end'; return;
          }
          addLog(g, `${p.token} ${p.name}: ${d1}+${d2}=${d1+d2}${isDouble?' 🎯':''}`);
          movePlayer(g, p, d1+d2);
        });
      },
      buyProperty(){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[p.pos];
          if(!t.price || g.owners[t.i]!=null) return;
          if(p.money < t.price){ addLog(g,'Za mało gotówki','warn'); return; }
          p.money -= t.price; p.owns.add(t.i); g.owners[t.i] = p.id;
          addLog(g, `${p.token} ${p.name} kupuje ${t.name} za ${t.price} zł`, 'good');
          const mw = checkMonopolyWin(g);
          if(mw){ g.monopolyWinner=mw.id; g.phase='gameover'; addLog(g,`👑 MONOPOL! ${mw.token} ${mw.name} ma 3 komplety kolorów i wszystkie dworce!`,'good'); return; }
          g.phase = 'end';
        });
        setModal(null);
      },
      skipBuy(){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[p.pos];
          const aliveCount = g.players.filter(pl=>!pl.bankrupt).length;
          if(aliveCount >= 3){
            g.pendingAuction = { tileIdx: t.i, excludePlayerId: p.id, bids: {} };
            g.phase = 'auction';
            addLog(g, `🏷️ ${p.name} rezygnuje — startuje aukcja na ${t.name}!`, 'info');
          } else {
            addLog(g, `${p.name} nie kupuje ${t.name}`);
            g.phase = 'end';
          }
        });
        setModal(null);
      },
      submitBid(playerId, amount){
        mutate(g=>{
          if(!g.pendingAuction) return;
          if(!g.pendingAuction.bids) g.pendingAuction.bids = {};
          g.pendingAuction.bids[playerId] = amount;
          const excl = g.pendingAuction.excludePlayerId;
          const eligible = g.players.filter(p=>!p.bankrupt && p.id!==excl);
          addLog(g, `🏷️ ${g.players[playerId].token} ${g.players[playerId].name} złożył ofertę aukcyjną`, 'info');
        });
      },
      resetAuctionBids(winnerIds){
        mutate(g=>{
          if(!g.pendingAuction) return;
          // Keep only tiebreakers as eligible, reset bids
          g.pendingAuction.bids = {};
          g.pendingAuction.tiebreakIds = winnerIds;
          addLog(g, `🏷️ Dogrywka aukcji: ${winnerIds.map(id=>g.players[id].name).join(' vs ')}`, 'info');
        });
      },
      resolveAuction(winnerId, amount){
        mutate(g=>{
          const winner = g.players[winnerId];
          const tile = BOARD[g.pendingAuction.tileIdx];
          winner.money -= amount;
          winner.owns.add(tile.i);
          g.owners[tile.i] = winnerId;
          addLog(g, `🏷️ ${winner.token} ${winner.name} kupuje ${tile.name} za ${amount} zł na aukcji!`, 'good');
          delete g.pendingAuction;
          const mw = checkMonopolyWin(g);
          if(mw){ g.monopolyWinner=mw.id; g.phase='gameover'; addLog(g,`👑 MONOPOL! ${mw.token} ${mw.name} ma 3 komplety kolorów i wszystkie dworce!`,'good'); return; }
          g.phase = 'end';
        });
      },
      skipAuction(){
        mutate(g=>{
          const tile = BOARD[g.pendingAuction.tileIdx];
          addLog(g, `🏷️ Nikt nie kupił ${tile.name} — wraca do banku`);
          delete g.pendingAuction; g.phase = 'end';
        });
      },
      endTurn(){
        mutate(g=>{
          const curP = g.players[g.cur];
          // Sprawdź bankructwo przed końcem tury
          if(curP.money < 0 && !curP.bankrupt){
            if(canRaiseFunds(g, curP)){
              addLog(g, `⚠️ ${curP.name} ma dług! Najpierw sprzedaj domki lub zastaw nieruchomości.`, 'warn');
              return;
            }
            declareBankrupt(g, curP);
          }
          // Odlicz turę kredytu i dolicz odsetki karne jeśli po terminie
          if(curP.loan){
            curP.loan.turnsLeft--;
            if(curP.loan.turnsLeft < 0){
              const penalty = Math.round(curP.loan.owed * 0.05);
              curP.loan.owed += penalty;
              addLog(g, `💸 ${curP.name} nie spłaca kredytu! Odsetki karne +${penalty} zł → dług: ${curP.loan.owed} zł`, 'warn');
            } else if(curP.loan.turnsLeft === 0){
              addLog(g, `⚠️ ${curP.name}: ostatnia tura na spłatę kredytu! (${curP.loan.owed} zł)`, 'warn');
            }
          }
          const isDouble = g.dice[0]===g.dice[1];
          if(isDouble && !curP.jail && g.doublesCount>0 && g.doublesCount<3){
            addLog(g, `${curP.name} rzuca ponownie (dublet)`, 'good'); g.phase='roll'; return;
          }
          g.doublesCount=0;
          const alive = g.players.filter(p=>!p.bankrupt);
          if(alive.length<=1){ g.phase='gameover'; addLog(g, `🏆 Wygrywa ${alive[0]?.name||'nikt'}!`, 'good'); return; }

          let next = g.cur;
          do { next = (next+1)%g.players.length; } while(g.players[next].bankrupt);

          // Nowa runda — gdy wrócimy do pierwszego żywego gracza
          const firstAliveId = g.players.find(p=>!p.bankrupt).id;
          if(g.players[next].id === firstAliveId && (g.turnCount||0) > 0){
            // Odlicz aktywne zdarzenie
            if(g.activeEvent){
              g.activeEvent.turnsLeft--;
              if(g.activeEvent.turnsLeft <= 0){
                addLog(g, `📰 Zdarzenie zakończone: ${g.activeEvent.text}`, 'info');
                g.activeEvent = null;
              }
            }
            // Losuj nowe zdarzenie
            drawEvent(g);
          }

          g.turnCount = (g.turnCount||0) + 1;
          g.cur = next; g.phase='roll';
        });
      },
      payJail(){
        mutate(g=>{ const p = g.players[g.cur]; if(p.money<50) return; p.money-=50; p.jail=false; p.jailTurns=0; addLog(g, `${p.name} płaci kaucję 50 zł`); });
      },
      useJailCard(){
        mutate(g=>{ const p = g.players[g.cur]; if(p.getOutCards<=0) return; p.getOutCards--; p.jail=false; p.jailTurns=0; addLog(g, `${p.name} używa karty "Wyjście z aresztu"`); });
      },
      buildHouse(i){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[i];
          let cost = housePrice(t.group);
          if(g.activeEvent?.effect.type==='build_disc') cost = Math.round(cost * g.activeEvent.effect.val);
          if(p.money<cost) return;
          const cur = p.houses[i]||0; if(cur>=5) return;
          const sibs = BOARD.filter(x=>x.group===t.group);
          const minLvl = Math.min(...sibs.map(x => p.houses[x.i]||0));
          if(cur>minLvl){ addLog(g,'Najpierw zbuduj na pozostałych ulicach tej dzielnicy','warn'); return; }
          p.money -= cost; p.houses[i] = cur+1;
          addLog(g, `${p.token} ${p.name} buduje ${cur+1===5?'HOTEL':`domek #${cur+1}`} na ${t.name}`, 'good');
        });
      },
      sellHouse(i){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[i]; const cost = housePrice(t.group);
          const cur = p.houses[i]||0; if(cur<=0) return;
          const sibs = BOARD.filter(x=>x.group===t.group);
          const maxLvl = Math.max(...sibs.map(x => p.houses[x.i]||0));
          if(cur<maxLvl){ addLog(g,'Najpierw sprzedaj z ulic z większą liczbą domków','warn'); return; }
          p.money += cost/2; p.houses[i] = cur-1;
          if(p.houses[i]===0) delete p.houses[i];
          addLog(g, `${p.name} sprzedaje budynek na ${t.name} za ${cost/2} zł`);
        });
      },
      mortgage(i){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[i];
          if(p.mortgaged.has(i)) return;
          if((p.houses[i]||0)>0){ addLog(g,'Najpierw sprzedaj budynki','warn'); return; }
          p.money += t.price/2; p.mortgaged.add(i);
          addLog(g, `${p.name} zastawia ${t.name} za ${t.price/2} zł`);
        });
      },
      unmortgage(i){
        mutate(g=>{
          const p = g.players[g.cur]; const t = BOARD[i]; const cost = Math.ceil(t.price*0.55);
          if(p.money<cost) return; p.money -= cost; p.mortgaged.delete(i);
          addLog(g, `${p.name} wykupuje ${t.name} za ${cost} zł`);
        });
      },
      resolveJarmark(rolls, ante){
        mutate(g=>{
          const alive = g.players.filter(p=>!p.bankrupt);
          // Pobierz stawkę od każdego gracza (ile ma, tyle płaci)
          alive.forEach(p=>{ p.money -= Math.min(ante, Math.max(0, p.money)); });
          const pot = ante * alive.length;
          const maxRoll = Math.max(...rolls.map(r=>r.roll));
          const winIds = rolls.filter(r=>r.roll===maxRoll).map(r=>r.id);
          const share = Math.floor(pot / winIds.length);
          winIds.forEach(id=>{ g.players[id].money += share; });
          if(winIds.length===1){
            const w = g.players[winIds[0]];
            addLog(g, `🎪 ${w.token} ${w.name} wygrał jarmark i zgarnął ${pot} zł!`, 'good');
          } else {
            const names = winIds.map(id=>g.players[id].name).join(' i ');
            addLog(g, `🎪 Remis na jarmarku! ${names} dzielą po ${share} zł`, 'info');
          }
          g.phase='end';
        });
      },
      payZabka(price, what){
        mutate(g=>{
          const p = g.players[g.cur];
          if(p.money < price) return;
          p.money -= price;
          if(what==='zdrapka') addLog(g, `🎫 ${p.token} ${p.name} kupuje zdrapkę w Żabce za ${price} zł`, 'info');
        });
      },
      buyMalpka(price){
        mutate(g=>{
          const p = g.players[g.cur];
          if(p.money < price) return;
          p.money -= price;
          // Losowe pole (0-39), inne niż obecne
          let newPos;
          do { newPos = Math.floor(Math.random()*40); } while(newPos === p.pos);
          p.pos = newPos;
          const tile = BOARD[newPos];
          addLog(g, `🥃 ${p.token} ${p.name} wypija małpkę — teleportacja na ${tile.name}! (${price} zł)`, 'info');
          g.phase = 'end';
        });
      },
      skipZabka(){
        mutate(g=>{
          addLog(g, `${g.players[g.cur].name} mija Żabkę`);
          g.phase = 'end';
        });
      },
      resolveScratch(win){
        mutate(g=>{
          const p = g.players[g.cur];
          if(win > 0){
            p.money += win;
            addLog(g, `🎫 ${p.token} ${p.name} zdrapuje ${win} zł!`, 'good');
          } else {
            addLog(g, `🎫 ${p.token} ${p.name} nie wygrywa na zdrapce`, 'info');
          }
          g.phase = 'end';
        });
      },
      takeLoan(amount){
        mutate(g=>{
          const p = g.players[g.cur];
          if(p.loan) return;
          const opts = {500:{owed:600}, 1000:{owed:1250}, 2000:{owed:2600}};
          const opt = opts[amount]; if(!opt) return;
          p.money += amount;
          p.loan = { owed: opt.owed, turnsLeft: 6 };
          addLog(g, `💳 ${p.token} ${p.name} bierze kredyt ${amount} zł · do zwrotu: ${opt.owed} zł (6 tur)`, 'info');
        });
      },
      repayLoan(){
        mutate(g=>{
          const p = g.players[g.cur];
          if(!p.loan || p.money < p.loan.owed) return;
          p.money -= p.loan.owed;
          addLog(g, `✅ ${p.token} ${p.name} spłacił kredyt (${p.loan.owed} zł)`, 'good');
          p.loan = null;
        });
      },
      resolveStadium(net){
        mutate(g=>{
          const p=g.players[g.cur];
          p.money+=net;
          if(net>0) addLog(g,`⚽ ${p.token} ${p.name} strzelił gola i wygrał ${net} zł na stadionie!`,'good');
          else addLog(g,`🧤 ${p.token} ${p.name} — karny obroniony! Traci ${-net} zł`,'warn');
          g.phase='end';
        });
      },
      skipStadium(){
        mutate(g=>{ addLog(g,`${g.players[g.cur].name} omija stadion`); g.phase='end'; });
      },
      resolveSlot(bet, win){
        mutate(g=>{
          const p = g.players[g.cur];
          p.money -= bet;
          if(win > 0){
            p.money += win;
            addLog(g, `🎰 ${p.token} ${p.name} wygrywa ${win} zł na automacie!`, 'good');
          } else {
            addLog(g, `🎰 ${p.token} ${p.name} traci ${bet} zł na automacie`, 'warn');
          }
          g.phase = 'end';
        });
      },
      skipSlot(){
        mutate(g=>{
          addLog(g, `${g.players[g.cur].name} omija automat`);
          g.phase = 'end';
        });
      },
      resolveCasino(net){
        mutate(g=>{
          const p = g.players[g.cur];
          p.money += net;
          if(net > 0) addLog(g, `🃏 ${p.token} ${p.name} wygrywa ${net} zł w kasynie!`, 'good');
          else if(net < 0) addLog(g, `🃏 ${p.token} ${p.name} przegrywa ${-net} zł w kasynie`, 'warn');
          else addLog(g, `🃏 ${p.token} ${p.name}: remis w kasynie`);
          g.phase = 'end';
        });
      },
      skipCasino(){
        mutate(g=>{
          addLog(g, `${g.players[g.cur].name} omija kasyno`);
          g.phase = 'end';
        });
      },
      async newGame(names, startMoney, timeLimit){
        const g = createGame(names, {startMoney, timeLimit});
        g.log.unshift({text:'Gra rozpoczęta. Rzucaj kostką!',kind:'good',t:Date.now()});
        const code = window.FB.genCode();
        await window.FB.createRoom(code, g);
        setRoomCode(code); setMyIdx(0); setGame(g); setMpMode('game');
      },
      timeUp(){
        mutate(g=>{
          if(g.phase==='gameover') return;
          const nw = window.netWorth || ((g,pid)=>g.players[pid].money);
          const ranking = g.players
            .map(p=>({...p, nw: nw(g, p.id)}))
            .sort((a,b)=>b.nw-a.nw);
          g.timeUpRanking = ranking;
          g.phase = 'gameover';
          addLog(g, `⏰ Czas minął! Wygrywa ${ranking[0].token} ${ranking[0].name} z majątkiem ${ranking[0].nw} zł!`, 'good');
        });
      },
      resetGame(){
        if(roomRef.current) window.FB.unlistenState(roomRef.current);
        localStorage.removeItem('plonskpol_game');
        setGame(null); setRoomCode(null); setMyIdx(null); setMpMode('lobby');
      },
      openModal: setModal,
      setSelectedTile,
      applyCard(card){ mutate(g => { doApplyCard(g, card); }); },
    };
  }, []);

  useEffect(()=>{ window.__applyCardFn = (g, card) => api.applyCard(card); }, [api]);

  // Odliczanie czasu gry
  useEffect(()=>{
    if(!game || !game.timeLimit || !game.startTime) { setTimeLeft(null); return; }
    if(game.phase === 'gameover') { setTimeLeft(null); return; }
    const tick = () => {
      const elapsed = Math.floor((Date.now() - game.startTime) / 1000);
      const left = Math.max(0, game.timeLimit - elapsed);
      setTimeLeft(left);
    };
    tick();
    const id = setInterval(tick, 500);
    return () => clearInterval(id);
  }, [game]);

  // Wywołaj timeUp gdy czas minie
  useEffect(()=>{
    if(timeLeft === 0 && game && game.phase !== 'gameover'){
      api.timeUp();
    }
  }, [timeLeft]);

  // Join game handler (called from Lobby)
  async function handleJoinGame(code){
    const result = await window.FB.joinRoom(code, window.FB.getSid());
    if(result.error) return result;
    setRoomCode(code); setMyIdx(result.idx); setGame(result.game); setMpMode('game');
    return {};
  }

  if(mpMode === 'lobby') return <Lobby onCreateGame={()=>setMpMode('setup')} onJoinGame={handleJoinGame}/>;
  if(mpMode === 'setup') return <Setup onStart={api.newGame}/>;
  if(!game) return <div style={{color:'#fff',padding:40,textAlign:'center'}}>⏳ Łączenie…</div>;

  const isMyTurn = myIdx !== null && game.cur === myIdx;
  const cur = game.players[game.cur];
  return (
    <div className="app">
      <Header game={game} api={api} timeLeft={timeLeft} roomCode={roomCode} isMyTurn={isMyTurn} myIdx={myIdx}/>
      <div className="main">
        <div className="left-panel">
          {game.players.map(p => (
            <PlayerCard key={p.id} player={p} isActive={p.id===game.cur} state={game}/>
          ))}
        </div>
        <Board game={game} onTileClick={t=>setSelectedTile(t)} animState={animState} />
        <div className="right-panel">
          {game.activeEvent && (
            <div className="event-banner">
              <div className="eb-label">📰 Wiadomości z Płońska</div>
              <div className="eb-text">{game.activeEvent.text}</div>
              <div className="eb-turns">Pozostało: {game.activeEvent.turnsLeft} {game.activeEvent.turnsLeft===1?'runda':'rundy'}</div>
            </div>
          )}
          <TurnPanel game={game} api={api} isAnimating={isAnimating} isMyTurn={isMyTurn} myIdx={myIdx}/>
          <EventLog log={game.log}/>
        </div>
      </div>
      {selectedTile && <PropertyCard tile={selectedTile} state={game} onClose={()=>setSelectedTile(null)} api={api}/>}
      {modal && <div/>}
      <EventPopup text={popupText} hiding={popupHiding}/>
      {tweaksOpen && <TweaksPanel game={game} api={api} onClose={()=>setTweaksOpen(false)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
